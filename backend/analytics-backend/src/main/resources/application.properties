spring.application.name=analytics-backend
# MySQL Connection Details
spring.datasource.url=jdbc:mysql://localhost:3306/aad1
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate/JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Assistant settings
assistant.provider=langgraph
assistant.model=llama3
assistant.timeout-ms=30000
assistant.max-context-orders=5
ai.langgraph.url=http://host.docker.internal:8000/api/chat/ask