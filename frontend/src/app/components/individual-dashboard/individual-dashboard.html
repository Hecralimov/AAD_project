<div class="dashboard-layout">
    <div class="main-content">
        <header class="header">
            <div class="header-title">
                <h1>My Shopping Analytics</h1>
                <p>Track your orders, spending, and habits</p>
            </div>
        </header>

        <!-- KPI Grid -->
        <div class="kpi-grid">
            @for (kpi of kpis; track kpi.title) {
            <div class="kpi-card">
                <div class="kpi-header">
                    <div class="kpi-icon-wrapper">
                        <span class="material-icons">{{ kpi.icon }}</span>
                    </div>
                </div>
                <div class="kpi-body">
                    <h3>{{ kpi.value }}</h3>
                    <p>{{ kpi.title }}</p>
                </div>
            </div>
            }
        </div>

        <div class="charts-grid">
            <div class="chart-card chart-span-2">
                <div class="chart-header">
                    <h2>Spending Habits</h2>
                </div>
                <div class="chart-container">
                    <canvas baseChart [data]="spendingChartData" [options]="spendingChartOptions" [type]="'line'">
                    </canvas>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-header">
                    <h2>Orders by Status</h2>
                </div>
                <div class="chart-container">
                    <canvas baseChart [data]="statusChartData" [options]="statusChartOptions" [type]="'doughnut'">
                    </canvas>
                </div>
            </div>
        </div>
    </div>
</div>
